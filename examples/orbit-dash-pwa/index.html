<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Orbit Dash" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <title>Orbit Dash</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Progressive Web Game</p>
          <h1>Orbit Dash</h1>
          <p class="subtitle">躲开下落方块，顺便验证桌面安装、主屏幕入口和本地 HTTPS 流程。</p>
          <div class="hero-pills">
            <span id="supportPill" class="hero-pill">检测安装支持</span>
            <span id="securityPill" class="hero-pill">检测安全状态</span>
            <span id="platformPill" class="hero-pill">检测平台</span>
          </div>
        </div>
        <div class="hero-actions">
          <button id="openInstallButton" class="install-button" type="button">安装到桌面</button>
          <button id="openTrustButton" class="secondary-button" type="button">信任证书</button>
          <button id="openSettingsButton" class="ghost-button" type="button">设置</button>
        </div>
      </section>

      <section class="stats" aria-label="游戏状态">
        <div class="stat-card">
          <span class="stat-label">分数</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">最高分</span>
          <strong id="bestScore">0</strong>
        </div>
        <div class="stat-card">
          <span class="stat-label">状态</span>
          <strong id="gameState">准备开始</strong>
        </div>
      </section>

      <section class="game-panel">
        <canvas id="gameCanvas" width="420" height="640" aria-label="Orbit Dash 游戏画布"></canvas>
        <div class="overlay-card">
          <p>左右移动，避开下落方块。</p>
          <p>桌面端：方向键或 A / D</p>
          <p>移动端：底部按钮</p>
          <button id="startButton" class="primary-button" type="button">开始游戏</button>
        </div>
      </section>

      <section class="touch-controls" aria-label="触摸控制">
        <button id="leftButton" class="touch-button" type="button">向左</button>
        <button id="rightButton" class="touch-button" type="button">向右</button>
      </section>

      <p id="installHint" class="sr-only" aria-live="polite">默认优先 HTTPS 访问；需要了解安装、证书或调试信息时，使用右上角按钮。</p>
    </main>

    <div id="modalRoot" class="modal-root" hidden>
      <div class="modal-backdrop" data-close-modal="true"></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header class="modal-header">
          <div>
            <p id="modalEyebrow" class="eyebrow">Details</p>
            <h2 id="modalTitle">说明</h2>
          </div>
          <button id="closeModalButton" class="ghost-button" type="button">关闭</button>
        </header>
        <div id="modalContent" class="modal-content"></div>
        <div id="modalActions" class="modal-actions"></div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
